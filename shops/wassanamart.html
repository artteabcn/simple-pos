<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wassana minimart - POS Terminal</title>
    <style>
        :root { --bg-color: #f7fafc; --card-bg: #ffffff; --text-main: #1a202c; --text-muted: #718096; --primary: #2563eb; --primary-light: #eff6ff; --border: #e2e8f0; --danger: #ef4444; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #121620; --card-bg: #1a202c; --text-main: #edf2f7; --text-muted: #a0aec0; --primary: #3b82f6; --primary-light: rgba(59, 130, 246, 0.1); --border: #2d3748; } }
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 12px; }
        .app { max-width: 750px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 16px; }
        .nav { display: flex; background: var(--border); border-radius: 8px; padding: 4px; margin-bottom: 16px; }
        .nav button { flex:1; background:none; border:none; padding:10px; font-weight:700; color:var(--text-muted); cursor:pointer; border-radius:6px; }
        .nav button.active { background:var(--card-bg); color:var(--primary); }
        .panel { display:none; } .panel.active { display:block; }
        .hero { background:var(--card-bg); border: 2px solid var(--primary); padding:16px; border-radius:12px; text-align:center; font-size:1.8rem; font-weight:800; color:var(--primary); margin-bottom:16px; }
        .card { background:var(--card-bg); padding:16px; border-radius:12px; border:1px solid var(--border); margin-bottom:12px; }
        .filter-bar { display:flex; gap:8px; overflow-x:auto; margin-bottom:12px; }
        .chip { background:var(--border); border:none; padding:6px 12px; border-radius:20px; font-size:0.85rem; font-weight:600; cursor:pointer; }
        .chip.active { background:var(--primary); color:white; }
        .row { display:grid; grid-template-columns: 2.5fr 1fr 1fr 0.4fr; gap:8px; margin-bottom:8px; align-items:center; }
        .btn { width:100%; height:42px; border:none; border-radius:6px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .btn-primary { background:var(--primary); color:white; }
        iframe { width:100%; height:500px; border:1px solid var(--border); border-radius:12px; background:white; margin-top:12px; }
    </style>
</head>
<body>
<div class="app">
    <header><h1>wassana minimart</h1><p style="color:var(--text-muted); margin:4px 0 0 0;">POS Client Node</p></header>
    <div class="nav"><button id="b1" class="active" onclick="m('calc')">1. Order Intake</button><button id="b2" onclick="m('doc')">2. Invoice Preview</button></div>
    <div class="hero" id="totalBox">0.00 ฿</div>
    <div id="pCalc" class="panel active">
        <div class="filter-bar" id="fBar"></div>
        <div class="card"><div id="lines"></div><button class="btn" style="background:var(--primary-light); color:var(--primary);" onclick="add()">➕ Add New Line Item</button></div>
        <div class="card"><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
            <div><label style="font-size:0.75rem; font-weight:700;">Discount</label><select id="disc" onchange="calc()"><option value="0">None</option><option value="5">5%</option><option value="10">10%</option></select></div>
            <div><label style="font-size:0.75rem; font-weight:700;">Service Charge</label><select id="sc" onchange="calc()"><option value="0">0%</option><option value="10">10%</option></select></div>
            <div><label style="font-size:0.75rem; font-weight:700;">Payment Route</label><select id="pm" onchange="calc()"><option value="Cash / เงินสด">Cash</option><option value="Credit Card">Card</option><option value="PromptPay / พร้อมเพย์">PromptPay</option></select></div>
        </div></div>
    </div>
    <div id="pDoc" class="panel">
        <div class="card" style="display:flex; gap:8px;"><button class="btn btn-primary" id="lEN" onclick="sl('EN')">English Layout</button><button class="btn" style="background:var(--border);" id="lTH" onclick="sl('TH')">ภาษาไทย</button></div>
        <div class="card" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="text" id="tab" value="Table 01" oninput="calc()"><input type="text" id="note" value="2 Guests" oninput="calc()">
        </div>
        <button class="btn btn-primary" onclick="window.frames[0].focus(); window.frames[0].print();">🖨️ Print Receipt Document</button>
        <iframe></iframe>
    </div>
</div>
<script>
let l="EN", f="ALL", dataset = [
    {
        "id": "m1",
        "nameEN": "Chang beer S",
        "nameTH": "เบียร์ชาง S",
        "price": 60,
        "category": "Beers/เบียร์"
    },
    {
        "id": "item_c5v45",
        "nameEN": "Leo Beer S",
        "nameTH": "ลีโอ เบียร์ S",
        "price": 60,
        "category": "Beers/เบียร์"
    },
    {
        "id": "item_e4otb",
        "nameEN": "Chang Beer B",
        "nameTH": "เบียร์ชาง B",
        "price": 80,
        "category": "Beers/เบียร์"
    },
    {
        "id": "item_k3iav",
        "nameEN": "Leo Beer B",
        "nameTH": "ลีโอ เบียร์ B",
        "price": 80,
        "category": "Beers/เบียร์"
    },
    {
        "id": "item_mce0i",
        "nameEN": "Sambucca",
        "nameTH": "แซมบูคา",
        "price": 100,
        "category": "Shots/ยิง"
    }
], values = { items:[], sub:0, dVal:0, sVal:0, vat:0, total:0 };
const dict = {
    EN: { title: "RECEIPT / GUEST CHECK", tax: "Tax ID:", sub: "Subtotal", vat: "VAT (7%)", sc: "Service Charge", disc: "Discount", total: "Total Due (฿)", payment: "Payment Route:" },
    TH: { title: "ใบเสร็จรับเงิน / เช็คบิล", tax: "เลขประจำตัวผู้เสียภาษี:", sub: "รวมยอดอาหาร", vat: "ภาษี (7%)", sc: "ค่าบริการ", disc: "ส่วนลด", total: "ยอดเงินรวมทั้งสิ้นสุทธิ (฿)", payment: "ช่องทางชำระเงิน:" }
};
function m(p){ document.getElementById("pCalc").className=p==="calc"?"panel active":"panel"; document.getElementById("pDoc").className=p==="doc"?"panel active":"panel"; document.getElementById("b1").className=p==="calc"?"active":""; document.getElementById("b2").className=p==="doc"?"active":""; }
function sl(lang){ l=lang; document.getElementById("lEN").className=l==="EN"?"btn btn-primary":"btn"; document.getElementById("lTH").className=l==="TH"?"btn btn-primary":"btn"; up(); calc(); }
function fb() {
    const bar = document.getElementById("fBar"); const cats = ["ALL", ...new Set(dataset.map(d => d.category).filter(Boolean))]; bar.innerHTML = "";
    cats.forEach(c => { const b = document.createElement("button"); b.className = "chip " + (f === c ? "active" : ""); b.innerText = c; b.onclick = () => { f = c; fb(); up(); }; bar.appendChild(b); });
}
function up() {
    document.querySelectorAll(".row select").forEach(s => {
        const cur = s.value; s.innerHTML = '<option value="">-- Item --</option>';
        dataset.forEach(d => { if(f==="ALL" || d.category===f || d.id===cur) { const o = document.createElement("option"); o.value=d.id; o.innerText= (l==="EN"?d.nameEN:d.nameTH) + " (" + d.price + ")"; s.appendChild(o); }}); s.value = cur;
    });
}
function add() {
    const id = "r_"+Math.random().toString(36).substr(2,5);
    const d = document.createElement("div"); d.className="row"; d.id=id;
    const sel = document.createElement("select"); sel.onchange = function() { hc(id); };
    const qIn = document.createElement("input"); qIn.type="number"; qIn.className="q"; qIn.value="1"; qIn.min="1"; qIn.oninput = calc;
    const pIn = document.createElement("input"); pIn.type="number"; pIn.className="p"; pIn.value="0"; pIn.readOnly=true; pIn.style.opacity="0.6";
    const del = document.createElement("button"); del.innerText="✕"; del.onclick = function() { d.remove(); calc(); };
    d.appendChild(sel); d.appendChild(qIn); d.appendChild(pIn); d.appendChild(del);
    document.getElementById("lines").appendChild(d); up();
}
function hc(id) { const r = document.getElementById(id); const m = dataset.find(d => d.id === r.querySelector("select").value); r.querySelector(".p").value = m ? m.price : 0; calc(); }
function calc() {
    let sub = 0; const items = [];
    document.querySelectorAll(".row").forEach(r => {
        const id = r.querySelector("select").value; const qty = parseFloat(r.querySelector(".q").value)||0; const pr = parseFloat(r.querySelector(".p").value)||0;
        if (id && qty > 0) { const m = dataset.find(d => d.id===id); sub += (qty*pr); items.push({ nEN: m.nameEN, nTH: m.nameTH, q: qty, p: pr, t: (qty*pr) }); }
    });
    const dVal = sub * (parseFloat(document.getElementById("disc").value)/100);
    const sVal = (sub - dVal) * (parseFloat(document.getElementById("sc").value)/100);
    const vat = (sub - dVal + sVal) * 0.07; const total = (sub - dVal + sVal + vat);
    document.getElementById("totalBox").innerText = Math.round(total).toLocaleString() + ".00 ฿";
    values = { items, sub, dVal, sVal, vat, total }; const dStr = new Date().toLocaleString("en-GB"); const labels = dict[l];
    let rHTML = ""; items.forEach(i => { rHTML += '<tr><td>' + (l==="EN"?i.nEN:i.nTH) + '</td><td style="text-align:right">' + i.q + '</td><td style="text-align:right">' + Math.round(i.p) + '.00</td><td style="text-align:right">' + Math.round(i.t) + '.00</td></tr>'; });
    let docContent = '<html><body style="font-family:sans-serif;font-size:12px;padding:10px;color:#333;">' +
    '<table><tr><td><strong>wassana minimart</strong><br>' + labels.tax + ' DBD 085567012791<br>Moo 4, Khanom Beach, Nakhon Si Thammarat, Thailand<br>Tel:  833972 285</td><td style="text-align:right;vertical-align:top"><strong>' + labels.title + '</strong><br>Ref: REC-CF<br>' + dStr + '</td></tr></table><br>' +
    '<div style="display:flex;justify-content:between"><span>Loc: ' + document.getElementById("tab").value + '</span> <span style="margin-left:auto">Note: ' + document.getElementById("note").value + '</span></div><br>' +
    '<table style="width:100%;border-collapse:collapse"><thead style="background:#2563eb;color:white"><tr><th style="text-align:left;padding:4px">Item</th><th style="text-align:right;padding:4px">Qty</th><th style="text-align:right;padding:4px">Unit</th><th style="text-align:right;padding:4px">Total</th></tr></thead><tbody>' + (rHTML || '<tr><td colspan="4" style="text-align:center;padding:10px">Empty Ticket</td></tr>') + '</tbody></table>' +
    '<table style="width:45%;margin-left:auto;margin-top:10px;font-weight:bold;line-height:1.6">' +
    '<tr><td>' + labels.sub + '</td><td style="text-align:right">' + Math.round(sub) + '.00</td></tr>' +
    (dVal > 0 ? '<tr><td style="color:#ef4444">' + labels.disc + '</td><td style="text-align:right;color:#ef4444">-' + Math.round(dVal) + '.00</td></tr>' : '') +
    (sVal > 0 ? '<tr><td>' + labels.sc + '</td><td style="text-align:right">+' + Math.round(sVal) + '.00</td></tr>' : '') +
    '<tr><td>' + labels.vat + '</td><td style="text-align:right">' + Math.round(vat) + '.00</td></tr>' +
    '<tr style="color:#2563eb;font-size:13px;background:#f0f6ff"><td>' + labels.total + '</td><td style="text-align:right">' + Math.round(total) + '.00</td></tr>' +
    '</table><br><div style="font-size:11px"><strong>' + labels.payment + '</strong> ' + document.getElementById("pm").value + '</div></body></html>';
    document.querySelector("iframe").srcdoc = docContent;
}
fb(); add();
</script>
</body>
</html>
